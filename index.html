<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関節可動域と柔軟性評価フラッシュカード</title>
<style>
body { font-family: sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; min-height: 100vh; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
#app-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
h1 { font-size: 20px; color: #355872; margin-bottom: 10px; text-align: center; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 20px; text-align: center; font-weight: bold; }
#muscle-img-wrapper { width: 100%; max-width: 400px; margin-bottom: 15px; display: none; }
#muscle-img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background-color: #fff; pointer-events: none; }
#quiz-container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; min-height: 300px; display: flex; flex-direction: column; justify-content: center; }
.question { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; line-height: 1.4; color: #355872; pointer-events: none; }
#furigana-container { display: none; font-size: 16px; color: #888; margin-bottom: 10px; text-align: center; line-height: 1.2; pointer-events: none; }
#answer-container { display: none; font-size: 28px; font-weight: bold; color: #ef4444; margin-bottom: 20px; text-align: center; line-height: 1.4; pointer-events: none; }
.btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
.btn:active { opacity: 0.8; }
#result-screen, #logo-container { display: none; text-align: center; }
#start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; }
#quiz-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 250px; cursor: pointer; }
.tap-guide { font-size: 13px; color: #aaa; margin-top: 30px; text-align: center; pointer-events: none; }
#logo-container { margin-top: 20px; text-align: center; width: 100%; pointer-events: none; }
#logo-container img { max-width: 150px; height: auto; opacity: 0.8; }
.start-logo { max-width: 200px; height: auto; margin-bottom: 20px; }
#progress-text { font-size: 14px; color: #666; text-align: right; width: 100%; margin-bottom: 15px; font-weight: bold; pointer-events: none; }
</style>
</head>
<body>

<div id="app-wrapper">

<div id="muscle-img-wrapper">
<img id="muscle-img" src="" alt="評価画像" onerror="this.style.display='none'">
</div>

<div id="quiz-container">

<div id="start-screen">
<img src="logo.png" alt="ロゴ" class="start-logo" id="start-logo-img">
<h1>関節可動域と柔軟性評価</h1>
<p class="subtitle">「続かない運動」を「心地よい習慣へ」。</p>
<button id="start-btn" class="btn" style="text-align: center; background-color: #355872; color: white;">学習をスタートする</button>
</div>

<div id="quiz-screen">
<div id="progress-text"></div>
<div id="question-text" class="question"></div>
<div id="furigana-container"></div>
<div id="answer-container"></div>
<div class="tap-guide">画面のどこかをタップ、または左右にスワイプ</div>
</div>

<div id="result-screen">
<h1>1周完了しました！</h1>
<div style="font-size: 16px; margin-top: 20px; color: #333; line-height: 1.6;">
反復学習で知識を定着させましょう。


お疲れ様でした！
</div>
<button id="reset-btn" class="btn" style="margin-top: 30px; text-align: center; background-color: #355872; color: white;">最初からやり直す</button>
</div>

</div>
<div id="logo-container">
<img src="logo.png" alt="ロゴ" id="footer-logo-img">
</div>
</div>

<script>
document.getElementById('start-logo-img').addEventListener('error', function() { this.style.display='none'; });
document.getElementById('footer-logo-img').addEventListener('error', function() { this.style.display='none'; });

const quizData = [
{ question: "「自動可動域(AROM)」の説明として正しいものは？", answer: "本人の力によって動かす範囲", furigana: "ほんにんのちからによってうごかすはんい", image: "arom.png" },
{ question: "「他動可動域(PROM)」を測定する主な目的は？", answer: "筋力・疼痛・関節包の制限を区別するため", furigana: "きんりょく・とうつう・かんせつほうのせいげんをくべつするため", image: "prom.png" },
{ question: "肩関節の「屈曲」の基準可動域は？", answer: "0〜180°", furigana: "0〜180ど", image: "shoulder_flexion.png" },
{ question: "肩関節の「伸展」の基準可動域は？", answer: "0〜50〜60°", furigana: "0〜50〜60ど", image: "shoulder_extension.png" },
{ question: "肩関節の「外転」の基準可動域は？", answer: "0〜180°", furigana: "0〜180ど", image: "shoulder_abduction.png" },
{ question: "肩関節の「内転」の基準可動域は？", answer: "0〜30〜50°", furigana: "0〜30〜50ど", image: "shoulder_adduction.png" },
{ question: "肩関節の「外旋」の基準可動域は？", answer: "0〜60°", furigana: "0〜60ど", image: "shoulder_er.png" },
{ question: "肩関節の「内旋」の基準可動域は？", answer: "0〜70°", furigana: "0〜70ど", image: "shoulder_ir.png" },
{ question: "肘関節の「屈曲」の基準可動域は？", answer: "0〜145°", furigana: "0〜145ど", image: "elbow_flexion.png" },
{ question: "肘関節の「伸展」の基準可動域は？", answer: "145〜0°", furigana: "145〜0ど", image: "elbow_extension.png" },
{ question: "前腕の「回内」の基準可動域は？", answer: "0〜90°", furigana: "0〜90ど", image: "forearm_pronation.png" },
{ question: "前腕の「回外」の基準可動域は？", answer: "0〜90°", furigana: "0〜90ど", image: "forearm_supination.png" },
{ question: "手関節の「背屈(伸展)」の基準可動域は？", answer: "0〜70°", furigana: "0〜70ど", image: "wrist_dorsiflexion.png" },
{ question: "手関節の「掌屈(屈曲)」の基準可動域は？", answer: "0〜80°", furigana: "0〜80ど", image: "wrist_palmarflexion.png" },
{ question: "手関節の「橈屈(とうくつ)」の基準可動域は？", answer: "0〜20°", furigana: "0〜20ど", image: "wrist_radial.png" },
{ question: "手関節の「尺屈(しゃくくつ)」の基準可動域は？", answer: "0〜30〜45°", furigana: "0〜30〜45ど", image: "wrist_ulnar.png" },
{ question: "股関節の「屈曲」の基準可動域は？", answer: "0〜125°", furigana: "0〜125ど", image: "hip_flexion.png" },
{ question: "股関節の「伸展」の基準可動域は？", answer: "0〜15°", furigana: "0〜15ど", image: "hip_extension.png" },
{ question: "股関節の「外転」の基準可動域は？", answer: "0〜45°", furigana: "0〜45ど", image: "hip_abduction.png" },
{ question: "股関節の「内転」の基準可動域は？", answer: "0〜20〜30°", furigana: "0〜20〜30ど", image: "hip_adduction.png" },
{ question: "股関節の「外旋」の基準可動域は？", answer: "0〜45°", furigana: "0〜45ど", image: "hip_er.png" },
{ question: "股関節の「内旋」の基準可動域は？", answer: "0〜45°", furigana: "0〜45ど", image: "hip_ir.png" },
{ question: "膝関節の「屈曲」の基準可動域は？", answer: "0〜130〜150°", furigana: "0〜130〜150ど", image: "knee_flexion.png" },
{ question: "膝関節の「伸展」の基準可動域は？", answer: "130〜0°", furigana: "130〜0ど", image: "knee_extension.png" },
{ question: "足関節の「背屈」の基準可動域は？", answer: "0〜20°", furigana: "0〜20ど", image: "ankle_dorsiflexion.png" },
{ question: "足関節の「底屈」の基準可動域は？", answer: "0〜45°", furigana: "0〜45ど", image: "ankle_plantarflexion.png" },
{ question: "足関節の「外反(回外)」の基準可動域は？", answer: "0〜20°", furigana: "0〜20ど", image: "ankle_eversion.png" },
{ question: "足関節の「内反(回内)」の基準可動域は？", answer: "0〜30°", furigana: "0〜30ど", image: "ankle_inversion.png" },
{ question: "頸部の「屈曲」の基準可動域は？", answer: "0〜60°", furigana: "0〜60ど", image: "cervical_flexion.png" },
{ question: "頸部の「伸展」の基準可動域は？", answer: "0〜50°", furigana: "0〜50ど", image: "cervical_extension.png" },
{ question: "頸部の「側屈(左右)」の基準可動域は？", answer: "0〜50°", furigana: "0〜50ど", image: "cervical_lateral.png" },
{ question: "頸部の「回旋(左右)」の基準可動域は？", answer: "0〜60°", furigana: "0〜60ど", image: "cervical_rotation.png" },
{ question: "胸腰椎の「屈曲」の基準可動域は？", answer: "0〜80〜90°", furigana: "0〜80〜90ど", image: "thoracolumbar_flexion.png" },
{ question: "胸腰椎の「伸展」の基準可動域は？", answer: "0〜30°", furigana: "0〜30ど", image: "thoracolumbar_extension.png" },
{ question: "胸腰椎の「側屈(左右)」の基準可動域は？", answer: "0〜30°", furigana: "0〜30ど", image: "thoracolumbar_lateral.png" },
{ question: "胸腰椎の「回旋(左右)」の基準可動域は？", answer: "0〜45°", furigana: "0〜45ど", image: "thoracolumbar_rotation.png" },
{ question: "前屈テストで主に評価される柔軟性の部位は？", answer: "ハムストリングス・腰部", furigana: "はむすとりんぐす・ようぶ", image: "forward_bend.png" },
{ question: "Thomas(トーマス)テストが評価する主な内容は？", answer: "股関節屈筋群の短縮", furigana: "こかんせつくっきんぐんのたんしゅく", image: "thomas_test.png" },
{ question: "Ely(エリー)テストが評価する主な内容は？", answer: "大腿直筋の柔軟性", furigana: "だいたいちょくきんのじゅうなんせい", image: "ely_test.png" },
{ question: "肩甲帯の可動テストで確認する主な項目は？", answer: "肩甲上腕リズム", furigana: "けんこうじょうわんりずむ", image: "scapulohumeral_rhythm.png" },
{ question: "ハムストリングスの短縮が招く姿勢変化の例として適切なものは？", answer: "骨盤後傾→腰椎のストレス増加", furigana: "こつばんこうけい → ようついのすとれすぞうか", image: "hamstring_shortness.png" },
{ question: "股関節の伸展不足が招きやすい運動障害の例は？", answer: "腰椎代償による腰痛リスク増", furigana: "ようついだいしょうによるようつうりすくぞう", image: "hip_extension_deficit.png" },
{ question: "胸椎の回旋制限が招きやすい運動障害の例は？", answer: "肩のインピンジメント症候群", furigana: "かたのいんぴんじめんとしょうこうぐん", image: "thoracic_rotation_deficit.png" },
{ question: "静的ストレッチの適切な保持時間は？", answer: "20〜30秒", furigana: "20〜30びょう", image: "static_stretch.png" },
{ question: "PNF(固有受容性神経筋促通法)の特徴として適切なものは？", answer: "収縮→弛緩→伸長を組み合わせる", furigana: "しゅうしゅく → しかん → しんちょうをくみあわせる", image: "pnf_stretch.png" },
{ question: "柔軟性向上指導時の「呼吸法」に関する注意点で適切なものは？", answer: "呼吸を止めると交感神経優位となり緊張が高まる", furigana: "こきゅうをとめるとこうかんしんけいゆういとなりきんちょうがたかまる", image: "breathing.png" },
{ question: "柔軟性向上の指導における注意点として適切なものは？", answer: "可動域が拡がっても関節の安定性が維持されているかチェックする", furigana: "かどういきがひろがってもかんせつのあんていせいが いじされているかちぇっくする", image: "flexibility_caution.png" }
];

let currentQuestionIndex = 0;
let isShowingAnswer = false;

document.getElementById("start-btn").addEventListener("click", function(e) {
e.stopPropagation();
document.getElementById("start-screen").style.display = "none";
document.getElementById("quiz-screen").style.display = "flex";
document.getElementById("logo-container").style.display = "block";
currentQuestionIndex = 0;
loadQuestion();
});

document.getElementById("reset-btn").addEventListener("click", function(e) {
e.stopPropagation();
document.getElementById("result-screen").style.display = "none";
document.getElementById("start-screen").style.display = "flex";
});

let touchStartX = 0;
let touchEndX = 0;
let isSwiping = false;

document.addEventListener("touchstart", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
touchStartX = e.changedTouches[0].screenX;
isSwiping = false;
}, {passive: true});

document.addEventListener("touchend", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
touchEndX = e.changedTouches[0].screenX;
const threshold = 50;

if (touchEndX < touchStartX - threshold) {
isSwiping = true;
advanceState();
} else if (touchEndX > touchStartX + threshold) {
isSwiping = true;
goBackState();
}
}, {passive: true});

document.addEventListener("click", function(e) {
if (document.getElementById("quiz-screen").style.display !== "flex") return;
if (isSwiping) return;
advanceState();
});

function advanceState() {
if (!isShowingAnswer) {
showAnswer();
} else {
if (currentQuestionIndex < quizData.length - 1) {
currentQuestionIndex++;
loadQuestion();
} else {
showResult();
}
}
}

function goBackState() {
if (isShowingAnswer) {
loadQuestion();
} else if (currentQuestionIndex > 0) {
currentQuestionIndex--;
loadQuestion();
}
}

function loadQuestion() {
isShowingAnswer = false;
const currentQuiz = quizData[currentQuestionIndex];
document.getElementById("progress-text").textContent = (currentQuestionIndex + 1) + " / " + quizData.length + " 問目";
document.getElementById("question-text").textContent = "Q" + (currentQuestionIndex + 1) + ". " + currentQuiz.question;

document.getElementById("furigana-container").style.display = "none";
document.getElementById("answer-container").style.display = "none";

const muscleImg = document.getElementById("muscle-img");
if (currentQuiz.image) {
muscleImg.src = currentQuiz.image;
muscleImg.style.display = "block";
document.getElementById("muscle-img-wrapper").style.display = "block";
} else {
document.getElementById("muscle-img-wrapper").style.display = "none";
}
}

function showAnswer() {
isShowingAnswer = true;
const currentQuiz = quizData[currentQuestionIndex];

const furiganaContainer = document.getElementById("furigana-container");
if (currentQuiz.furigana) {
furiganaContainer.textContent = currentQuiz.furigana;
furiganaContainer.style.display = "block";
}

const answerContainer = document.getElementById("answer-container");
answerContainer.textContent = currentQuiz.answer;
answerContainer.style.display = "block";
}

function showResult() {
document.getElementById("quiz-screen").style.display = "none";
document.getElementById("logo-container").style.display = "none";
document.getElementById("muscle-img-wrapper").style.display = "none";
document.getElementById("result-screen").style.display = "block";
}
</script>

</body>
</html>
